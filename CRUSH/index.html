<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>CRUSH</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;touch-action:none;overscroll-behavior:none;position:fixed;width:100%;height:100%;background:#0a0a14;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#game{width:100%;height:100%}
</style>
</head>
<body>
<div id="game"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>
const COLS=8,ROWS=10,NC=5;
const COLORS=[0xef4444,0x3b82f6,0x22c55e,0xeab308,0xa855f7];
const CLIGHT=[0xf87171,0x60a5fa,0x4ade80,0xfacc15,0xc084fc];

class GameScene extends Phaser.Scene {
    constructor(){super('GameScene')}

    create(){
        this.state='menu'; this.score=0; this.moves=30; this.best=parseInt(localStorage.getItem('crush-best')||'0');
        this.grid=[]; this.preview=null; this.particles=[]; this.popups=[];
        this.cascading=false; this.largestCluster=0; this.totalCascades=0;
        this.calcLayout();
        const w=this.scale.width, h=this.scale.height;

        this.boardGfx=this.add.graphics().setDepth(0);
        this.pieceGfx=this.add.graphics().setDepth(1);
        this.hlGfx=this.add.graphics().setDepth(2);
        this.partGfx=this.add.graphics().setDepth(5);

        this.scoreText=this.add.text(w/2,h*0.03,'0',{fontSize:'44px',fontStyle:'bold',color:'#ffffff'}).setOrigin(0.5,0).setAlpha(0).setDepth(10);
        this.movesText=this.add.text(w*0.12,h*0.03,'30',{fontSize:'36px',fontStyle:'bold',color:'#ffffff'}).setOrigin(0.5,0).setAlpha(0).setDepth(10);
        this.movesLabel=this.add.text(w*0.12,h*0.08,'moves',{fontSize:'12px',color:'#888899'}).setOrigin(0.5,0).setAlpha(0).setDepth(10);
        this.clusterSizeText=this.add.text(0,0,'',{fontSize:'48px',fontStyle:'bold',color:'#ffffff'}).setOrigin(0.5).setAlpha(0).setDepth(12);

        // Bottom stats
        this.bestLabel=this.add.text(w/2,h*0.92,'',{fontSize:'16px',color:'#ffd700'}).setOrigin(0.5).setAlpha(0).setDepth(10);
        this.bigLabel=this.add.text(w/2,h*0.96,'',{fontSize:'14px',color:'#888899'}).setOrigin(0.5).setAlpha(0).setDepth(10);

        this.menuC=this.add.container(0,0).setDepth(20);
        this.menuC.add(this.add.text(w/2,h*0.25,'CRUSH',{fontSize:'64px',fontStyle:'bold',color:'#e0e0f0'}).setOrigin(0.5));
        this.menuC.add(this.add.text(w/2,h*0.33,'tap to crush',{fontSize:'20px',color:'#888899'}).setOrigin(0.5));
        this.menuC.add(this.add.text(w/2,h*0.45,'tap groups of 3+\nbigger groups score more',{fontSize:'16px',color:'#666677',align:'center'}).setOrigin(0.5));
        this.menuC.add(this.add.text(w/2,h*0.55,'30 moves · make them count',{fontSize:'16px',color:'#aaaacc'}).setOrigin(0.5));
        this.menuTap=this.add.text(w/2,h*0.68,'tap to start',{fontSize:'24px',color:'#ffd700'}).setOrigin(0.5);
        this.menuC.add(this.menuTap);

        this.deathC=this.add.container(0,0).setDepth(20).setVisible(false);
        this.deathOvl=this.add.graphics();
        this.deathC.add(this.deathOvl);
        this.dScoreL=this.add.text(w/2,h*0.28,'Score',{fontSize:'22px',color:'#888899'}).setOrigin(0.5);
        this.dScore=this.add.text(w/2,h*0.36,'',{fontSize:'56px',fontStyle:'bold',color:'#e0e0f0'}).setOrigin(0.5);
        this.dBest=this.add.text(w/2,h*0.46,'',{fontSize:'22px',color:'#ffd700'}).setOrigin(0.5);
        this.dStats=this.add.text(w/2,h*0.56,'',{fontSize:'16px',color:'#666677',align:'center'}).setOrigin(0.5);
        this.dRetry=this.add.text(w/2,h*0.70,'tap to retry',{fontSize:'24px',color:'#ffd700'}).setOrigin(0.5);
        [this.dScoreL,this.dScore,this.dBest,this.dStats,this.dRetry].forEach(t=>this.deathC.add(t));

        this.input.on('pointerdown',p=>this.onDown(p));
        this.input.on('pointermove',p=>this.onMove(p));
        this.input.on('pointerup',()=>this.onUp());
    }

    calcLayout(){
        const w=this.scale.width,h=this.scale.height,margin=12;
        this.cellSize=Math.floor((w-margin*2)/COLS);
        const bw=this.cellSize*COLS,bh=this.cellSize*ROWS;
        this.boardLeft=Math.floor((w-bw)/2);
        this.boardTop=Math.floor(h*0.12);
        if(this.boardTop+bh>h*0.88) this.boardTop=Math.floor(h*0.88-bh);
    }

    cellCenter(c,r){return{x:this.boardLeft+c*this.cellSize+this.cellSize/2,y:this.boardTop+r*this.cellSize+this.cellSize/2}}
    getCell(p){const c=Math.floor((p.x-this.boardLeft)/this.cellSize),r=Math.floor((p.y-this.boardTop)/this.cellSize);return(c>=0&&c<COLS&&r>=0&&r<ROWS)?{col:c,row:r}:null}

    initBoard(){
        this.grid=[];
        for(let c=0;c<COLS;c++){this.grid[c]=[];for(let r=0;r<ROWS;r++)this.grid[c][r]={color:Phaser.Math.Between(0,NC-1),col:c,row:r,offY:0}}
    }

    getCluster(sc,sr){
        if(!this.grid[sc]||!this.grid[sc][sr])return[];
        const color=this.grid[sc][sr].color,vis=new Set(),cluster=[],stack=[{col:sc,row:sr}];
        while(stack.length){
            const{col,row}=stack.pop(),key=col+','+row;
            if(vis.has(key))continue; if(col<0||col>=COLS||row<0||row>=ROWS)continue;
            if(!this.grid[col][row]||this.grid[col][row].color!==color)continue;
            vis.add(key);cluster.push({col,row});
            stack.push({col:col+1,row},{col:col-1,row},{col,row:row+1},{col,row:row-1});
        }
        return cluster;
    }

    findAllClusters(){
        const vis=new Set(),clusters=[];
        for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
            const k=c+','+r;if(vis.has(k)||!this.grid[c][r])continue;
            const cl=this.getCluster(c,r);cl.forEach(p=>vis.add(p.col+','+p.row));
            if(cl.length>=3)clusters.push(cl);
        }
        return clusters;
    }

    startGame(){
        this.state='playing';this.score=0;this.moves=30;this.largestCluster=0;this.totalCascades=0;
        this.menuC.setVisible(false);this.deathC.setVisible(false);
        this.scoreText.setText('0').setAlpha(0.4);
        this.movesText.setText('30').setAlpha(0.6);this.movesLabel.setAlpha(0.3);
        this.bestLabel.setText('Best: '+this.best).setAlpha(0.2);
        this.bigLabel.setText('').setAlpha(0.2);
        this.initBoard();this.drawBoard();this.drawPieces();
    }

    onDown(p){
        if(this.state==='menu'){this.startGame();return}
        if(this.state==='dead'){this.startGame();return}
        if(this.state!=='playing'||this.cascading)return;
        const cell=this.getCell(p);if(!cell)return;
        const cl=this.getCluster(cell.col,cell.row);
        if(cl.length>=3){this.preview=cl;this.drawHighlight(cl)}
        else{this.preview=null;this.hlGfx.clear()}
    }

    onMove(p){
        if(this.state!=='playing'||this.cascading||!p.isDown)return;
        const cell=this.getCell(p);if(!cell){this.preview=null;this.hlGfx.clear();this.clusterSizeText.setAlpha(0);return}
        const cl=this.getCluster(cell.col,cell.row);
        if(cl.length>=3){this.preview=cl;this.drawHighlight(cl)}
        else{this.preview=null;this.hlGfx.clear();this.clusterSizeText.setAlpha(0)}
    }

    onUp(){
        if(this.state!=='playing'||this.cascading)return;
        if(this.preview&&this.preview.length>=3){
            this.clearCluster(this.preview,1);
            this.moves--;
            if(this.preview.length>=7)this.moves++;
            if(this.preview.length>=10)this.moves++;
            this.movesText.setText(this.moves.toString());
            if(this.moves<=5)this.movesText.setColor('#ef4444');
            this.largestCluster=Math.max(this.largestCluster,this.preview.length);
            this.bigLabel.setText('Largest: '+this.largestCluster);
        }
        this.preview=null;this.hlGfx.clear();this.clusterSizeText.setAlpha(0);
    }

    drawHighlight(cl){
        this.hlGfx.clear();
        let cx=0,cy=0;
        for(const p of cl){
            const pos=this.cellCenter(p.col,p.row);cx+=pos.x;cy+=pos.y;
            this.hlGfx.lineStyle(2,0xffffff,0.4);
            const hs=(this.cellSize-4)/2*1.1;
            this.hlGfx.strokeRoundedRect(pos.x-hs,pos.y-hs,hs*2,hs*2,6);
        }
        cx/=cl.length;cy/=cl.length;
        this.clusterSizeText.setText(cl.length.toString()).setPosition(cx,cy).setAlpha(0.9);
    }

    clearCluster(cl,cascadeLevel){
        const base=cl.length*(cl.length-1)*5;
        const pts=base*cascadeLevel;
        this.score+=pts;this.scoreText.setText(this.score.toString());

        let cx=0,cy=0;
        for(const p of cl){
            const pos=this.cellCenter(p.col,p.row);cx+=pos.x;cy+=pos.y;
            this.spawnParticles(pos.x,pos.y,this.grid[p.col][p.row].color);
            this.grid[p.col][p.row]=null;
        }
        cx/=cl.length;cy/=cl.length;

        if(cl.length>=8){this.cameras.main.shake(100,0.006);if(navigator.vibrate)navigator.vibrate(50)}
        else{if(navigator.vibrate)navigator.vibrate(10)}

        if(cascadeLevel>1)this.totalCascades++;

        this.applyGravity();

        // Check cascade after delay
        this.cascading=true;
        this.time.delayedCall(450,()=>{
            const newCl=this.findAllClusters();
            if(newCl.length>0){
                for(const c of newCl)this.clearCluster(c,cascadeLevel+1);
            } else {
                this.cascading=false;
                this.ensureValidBoard();
                if(this.moves<=0)this.gameOver();
            }
        });
    }

    applyGravity(){
        for(let c=0;c<COLS;c++){
            const pieces=[];
            for(let r=0;r<ROWS;r++){if(this.grid[c][r])pieces.push(this.grid[c][r])}
            const empty=ROWS-pieces.length;
            for(let i=0;i<empty;i++)pieces.unshift({color:Phaser.Math.Between(0,NC-1),col:c,row:0,offY:-(empty-i)*this.cellSize});
            for(let r=0;r<ROWS;r++){
                const p=pieces[r];const oldOff=p.offY||0;const diff=r-p.row;
                p.offY=oldOff-diff*this.cellSize;p.row=r;p.col=c;this.grid[c][r]=p;
            }
        }
        this.fallAnim={t:0,dur:0.3};
    }

    ensureValidBoard(){
        const cls=this.findAllClusters();
        if(cls.length===0){
            // Reshuffle
            for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
                if(this.grid[c][r])this.grid[c][r].color=Phaser.Math.Between(0,NC-1);
            }
            if(this.findAllClusters().length===0)this.gameOver();
        }
    }

    spawnParticles(x,y,ci){
        const clr=COLORS[ci]||0xffffff;
        for(let i=0;i<3;i++){const a=Math.random()*Math.PI*2;this.particles.push({x,y,vx:Math.cos(a)*70,vy:Math.sin(a)*70,life:1,color:clr,size:3})}
    }

    drawBoard(){
        this.boardGfx.clear();
        this.boardGfx.fillStyle(0x0f0f1a);
        this.boardGfx.fillRect(this.boardLeft,this.boardTop,this.cellSize*COLS,this.cellSize*ROWS);
        this.boardGfx.lineStyle(1,0x1a1a2a,0.12);
        for(let c=0;c<=COLS;c++){const x=this.boardLeft+c*this.cellSize;this.boardGfx.lineBetween(x,this.boardTop,x,this.boardTop+this.cellSize*ROWS)}
        for(let r=0;r<=ROWS;r++){const y=this.boardTop+r*this.cellSize;this.boardGfx.lineBetween(this.boardLeft,y,this.boardLeft+this.cellSize*COLS,y)}
    }

    drawPieces(){
        this.pieceGfx.clear();
        const half=(this.cellSize-4)/2;
        for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
            const p=this.grid[c][r];if(!p)continue;
            const pos=this.cellCenter(c,r);const py=pos.y+(p.offY||0);
            this.pieceGfx.fillStyle(COLORS[p.color]);
            this.pieceGfx.fillRoundedRect(pos.x-half,py-half,half*2,half*2,5);
            // Inner icon
            const is=half*0.3;
            this.pieceGfx.fillStyle(CLIGHT[p.color],0.7);
            if(p.color===0)this.pieceGfx.fillCircle(pos.x,py,is);
            else if(p.color===1){this.pieceGfx.fillTriangle(pos.x,py-is,pos.x+is,py,pos.x,py+is);this.pieceGfx.fillTriangle(pos.x,py-is,pos.x-is,py,pos.x,py+is)}
            else if(p.color===2)this.pieceGfx.fillTriangle(pos.x,py-is,pos.x-is,py+is,pos.x+is,py+is);
            else{const d=is*0.4;this.pieceGfx.fillRect(pos.x-d,py-is,d*2,is*2);this.pieceGfx.fillRect(pos.x-is,py-d,is*2,d*2)}
        }
    }

    gameOver(){
        this.state='dead';
        if(this.score>this.best){this.best=this.score;localStorage.setItem('crush-best',this.best.toString())}
        const w=this.scale.width,h=this.scale.height;
        this.deathOvl.clear();this.deathOvl.fillStyle(0x000000,0.75);this.deathOvl.fillRect(0,0,w,h);
        this.dScore.setText(this.score.toString()).setPosition(w/2,h*0.36);
        this.dBest.setText('Best: '+this.best).setPosition(w/2,h*0.46);
        this.dStats.setText('Largest cluster: '+this.largestCluster+'\nCascades: '+this.totalCascades).setPosition(w/2,h*0.56);
        this.dRetry.setPosition(w/2,h*0.70);
        this.deathC.setVisible(true);
    }

    update(time,delta){
        const dt=delta/1000;
        if(this.state==='menu'){this.menuTap.setAlpha(0.5+Math.sin(time/400)*0.5);return}
        if(this.state==='dead'){this.dRetry.setAlpha(0.5+Math.sin(time/400)*0.5);return}

        // Fall animation
        if(this.fallAnim){
            this.fallAnim.t+=dt;const prog=Math.min(1,this.fallAnim.t/this.fallAnim.dur);
            const ease=1-Math.pow(1-prog,3);
            for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
                const p=this.grid[c][r];if(!p)continue;
                if(p.offY)p.offY*=(1-ease);if(Math.abs(p.offY||0)<0.5)p.offY=0;
            }
            if(prog>=1){this.fallAnim=null;if(navigator.vibrate)navigator.vibrate(5)}
            this.drawPieces();
        }

        // Particles
        this.partGfx.clear();
        this.particles=this.particles.filter(p=>{
            p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt*4;if(p.life<=0)return false;
            this.partGfx.fillStyle(p.color,p.life);this.partGfx.fillCircle(p.x,p.y,p.size*p.life);return true;
        });
    }
}

new Phaser.Game({
    type:Phaser.AUTO,
    scale:{mode:Phaser.Scale.RESIZE,parent:'game',width:'100%',height:'100%',autoCenter:Phaser.Scale.CENTER_BOTH},
    backgroundColor:'#0a0a14',scene:[GameScene],
    physics:{default:'arcade',arcade:{gravity:{x:0,y:0},debug:false}}
});
</script>
</body>
</html>
