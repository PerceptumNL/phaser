<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>RISE</title>
<style>
html,body{margin:0;padding:0;overflow:hidden;touch-action:none;overscroll-behavior:none;position:fixed;width:100%;height:100%;background:#0a0a14;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#game{width:100%;height:100%}
</style>
</head>
<body>
<div id="game"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>
const COLS=6,ROWS=12,NC=5;
const COLORS=[0xef4444,0x3b82f6,0x22c55e,0xeab308,0xa855f7];
const CLIGHT=[0xf87171,0x60a5fa,0x4ade80,0xfacc15,0xc084fc];

class GameScene extends Phaser.Scene {
    constructor(){super('GameScene')}
    create(){
        this.state='menu';this.score=0;this.best=parseInt(localStorage.getItem('rise-best')||'0');
        this.grid=[];this.riseInterval=8;this.riseTimer=0;this.risePause=0;
        this.rowsRisen=0;this.particles=[];this.cascadeLevel=0;
        this.selectedCell=null;this.swipeStart=null;

        const w=this.scale.width,h=this.scale.height;
        this.calcLayout();
        this.boardGfx=this.add.graphics().setDepth(0);
        this.pieceGfx=this.add.graphics().setDepth(1);
        this.hlGfx=this.add.graphics().setDepth(2);
        this.partGfx=this.add.graphics().setDepth(5);
        this.riseBar=this.add.graphics().setDepth(6);

        this.scoreText=this.add.text(w/2,10,'0',{fontSize:'44px',fontStyle:'bold',color:'#ffffff'}).setOrigin(0.5,0).setAlpha(0).setDepth(10);
        this.warningGfx=this.add.graphics().setDepth(7);

        this.menuC=this.add.container(0,0).setDepth(20);
        this.menuC.add(this.add.text(w/2,h*0.25,'RISE',{fontSize:'64px',fontStyle:'bold',color:'#e0e0f0'}).setOrigin(0.5));
        this.menuC.add(this.add.text(w/2,h*0.35,'swap · match · survive',{fontSize:'18px',color:'#888899'}).setOrigin(0.5));
        this.menuC.add(this.add.text(w/2,h*0.47,'swipe to swap adjacent pieces\nmatch 3+ in a line to clear\nrows rise from below — don\'t let them reach the top',{fontSize:'14px',color:'#666677',align:'center'}).setOrigin(0.5));
        this.menuTap=this.add.text(w/2,h*0.65,'tap to start',{fontSize:'24px',color:'#ffd700'}).setOrigin(0.5);
        this.menuC.add(this.menuTap);

        this.deathC=this.add.container(0,0).setDepth(20).setVisible(false);
        this.deathOvl=this.add.graphics();this.deathC.add(this.deathOvl);
        this.dScore=this.add.text(w/2,h*0.38,'',{fontSize:'56px',fontStyle:'bold',color:'#e0e0f0'}).setOrigin(0.5);
        this.dBest=this.add.text(w/2,h*0.48,'',{fontSize:'22px',color:'#ffd700'}).setOrigin(0.5);
        this.dRetry=this.add.text(w/2,h*0.65,'tap to retry',{fontSize:'24px',color:'#ffd700'}).setOrigin(0.5);
        [this.add.text(w/2,h*0.28,'Score',{fontSize:'22px',color:'#888899'}).setOrigin(0.5),this.dScore,this.dBest,this.dRetry].forEach(t=>this.deathC.add(t));

        this.input.on('pointerdown',p=>this.onDown(p));
        this.input.on('pointerup',p=>this.onUp(p));
    }

    calcLayout(){
        const w=this.scale.width,h=this.scale.height,margin=16;
        this.cellSize=Math.floor((w-margin*2)/COLS);
        this.boardLeft=Math.floor((w-this.cellSize*COLS)/2);
        this.boardTop=Math.floor(h*0.10);
    }

    cellCenter(c,r){return{x:this.boardLeft+c*this.cellSize+this.cellSize/2,y:this.boardTop+r*this.cellSize+this.cellSize/2}}
    getCell(p){const c=Math.floor((p.x-this.boardLeft)/this.cellSize),r=Math.floor((p.y-this.boardTop)/this.cellSize);return(c>=0&&c<COLS&&r>=0&&r<ROWS)?{col:c,row:r}:null}

    initBoard(){
        this.grid=[];
        for(let c=0;c<COLS;c++){this.grid[c]=[];for(let r=0;r<ROWS;r++)this.grid[c][r]=r>=ROWS-6?{color:Phaser.Math.Between(0,NC-1)}:null}
        // Clear any initial matches
        let safety=0;
        while(this.findMatches().length>0&&safety<50){
            for(const m of this.findMatches())for(const p of m)this.grid[p.col][p.row].color=Phaser.Math.Between(0,NC-1);
            safety++;
        }
    }

    onDown(p){
        if(this.state==='menu'){this.startGame();return}
        if(this.state==='dead'){this.startGame();return}
        this.swipeStart={x:p.x,y:p.y,cell:this.getCell(p)};
    }

    onUp(p){
        if(this.state!=='playing'||!this.swipeStart||!this.swipeStart.cell)return;
        const dx=p.x-this.swipeStart.x,dy=p.y-this.swipeStart.y;
        let dir=null;
        if(Math.abs(dx)>20||Math.abs(dy)>20){
            if(Math.abs(dx)>Math.abs(dy))dir=dx>0?{dc:1,dr:0}:{dc:-1,dr:0};
            else dir=dy>0?{dc:0,dr:1}:{dc:0,dr:-1};
        }
        if(!dir){this.swipeStart=null;return}
        const sc=this.swipeStart.cell;
        const tc={col:sc.col+dir.dc,row:sc.row+dir.dr};
        if(tc.col<0||tc.col>=COLS||tc.row<0||tc.row>=ROWS){this.swipeStart=null;return}
        if(!this.grid[sc.col][sc.row]||!this.grid[tc.col][tc.row]){this.swipeStart=null;return}
        // Swap
        const tmp=this.grid[sc.col][sc.row];
        this.grid[sc.col][sc.row]=this.grid[tc.col][tc.row];
        this.grid[tc.col][tc.row]=tmp;
        this.swipeStart=null;
        // Check matches
        this.time.delayedCall(100,()=>this.processMatches(1));
    }

    findMatches(){
        const matches=[];
        // Horizontal
        for(let r=0;r<ROWS;r++){
            for(let c=0;c<COLS-2;c++){
                if(!this.grid[c][r])continue;
                const color=this.grid[c][r].color;let len=1;
                while(c+len<COLS&&this.grid[c+len][r]&&this.grid[c+len][r].color===color)len++;
                if(len>=3){const m=[];for(let i=0;i<len;i++)m.push({col:c+i,row:r});matches.push(m);c+=len-1}
            }
        }
        // Vertical
        for(let c=0;c<COLS;c++){
            for(let r=0;r<ROWS-2;r++){
                if(!this.grid[c][r])continue;
                const color=this.grid[c][r].color;let len=1;
                while(r+len<ROWS&&this.grid[c][r+len]&&this.grid[c][r+len].color===color)len++;
                if(len>=3){const m=[];for(let i=0;i<len;i++)m.push({col:c,row:r+i});matches.push(m);r+=len-1}
            }
        }
        return matches;
    }

    processMatches(cascadeLevel){
        const matches=this.findMatches();
        if(matches.length===0)return;
        // Clear all matched
        const cleared=new Set();
        for(const m of matches){
            let pts=m.length<=3?30:m.length===4?80:m.length===5?150:250;
            pts*=cascadeLevel;this.score+=pts;
            for(const p of m){
                const k=p.col+','+p.row;
                if(!cleared.has(k)){
                    cleared.add(k);
                    const pos=this.cellCenter(p.col,p.row);
                    this.spawnParticles(pos.x,pos.y,this.grid[p.col][p.row].color);
                    this.grid[p.col][p.row]=null;
                }
            }
        }
        this.scoreText.setText(this.score.toString());
        this.risePause+=1; // Pause rise by 1 second per match
        // Gravity
        this.applyGravity();
        // Check cascades
        this.time.delayedCall(200,()=>this.processMatches(cascadeLevel+1));
    }

    applyGravity(){
        for(let c=0;c<COLS;c++){
            const pieces=[];
            for(let r=0;r<ROWS;r++){if(this.grid[c][r])pieces.push(this.grid[c][r])}
            for(let r=0;r<ROWS;r++)this.grid[c][r]=null;
            const offset=ROWS-pieces.length;
            for(let i=0;i<pieces.length;i++)this.grid[c][offset+i]=pieces[i];
        }
    }

    riseRow(){
        // Check if top row has pieces
        for(let c=0;c<COLS;c++){if(this.grid[c][0]){this.die();return}}
        // Shift up
        for(let c=0;c<COLS;c++){
            for(let r=0;r<ROWS-1;r++)this.grid[c][r]=this.grid[c][r+1];
            this.grid[c][ROWS-1]={color:Phaser.Math.Between(0,NC-1)};
        }
        this.rowsRisen++;this.score+=10;this.scoreText.setText(this.score.toString());
        this.riseInterval=Math.max(8-this.rowsRisen*0.3,2);
    }

    spawnParticles(x,y,ci){
        const clr=COLORS[ci]||0xffffff;
        for(let i=0;i<3;i++){const a=Math.random()*Math.PI*2;this.particles.push({x,y,vx:Math.cos(a)*60,vy:Math.sin(a)*60,life:1,color:clr,size:3})}
    }

    startGame(){
        this.state='playing';this.score=0;this.riseTimer=0;this.risePause=0;
        this.riseInterval=8;this.rowsRisen=0;this.particles=[];
        this.menuC.setVisible(false);this.deathC.setVisible(false);
        this.scoreText.setText('0').setAlpha(0.4);
        this.initBoard();this.drawBoard();
    }

    die(){
        this.state='dead';this.cameras.main.shake(100,0.005);
        if(this.score>this.best){this.best=this.score;localStorage.setItem('rise-best',this.best.toString())}
        const w=this.scale.width,h=this.scale.height;
        this.deathOvl.clear();this.deathOvl.fillStyle(0x000000,0.75);this.deathOvl.fillRect(0,0,w,h);
        this.dScore.setText(this.score.toString()).setPosition(w/2,h*0.38);
        this.dBest.setText('Best: '+this.best).setPosition(w/2,h*0.48);
        this.dRetry.setPosition(w/2,h*0.65);
        this.deathC.setVisible(true);
    }

    drawBoard(){
        this.boardGfx.clear();
        const bw=this.cellSize*COLS,bh=this.cellSize*ROWS;
        this.boardGfx.fillStyle(0x0f0f1a);this.boardGfx.fillRect(this.boardLeft,this.boardTop,bw,bh);
        this.boardGfx.lineStyle(1,0x1a1a2a,0.12);
        for(let c=0;c<=COLS;c++){const x=this.boardLeft+c*this.cellSize;this.boardGfx.lineBetween(x,this.boardTop,x,this.boardTop+bh)}
        for(let r=0;r<=ROWS;r++){const y=this.boardTop+r*this.cellSize;this.boardGfx.lineBetween(this.boardLeft,y,this.boardLeft+bw,y)}
        // Ceiling warning line
        this.boardGfx.lineStyle(2,0xff3333,0.4);
        this.boardGfx.lineBetween(this.boardLeft,this.boardTop,this.boardLeft+bw,this.boardTop);
    }

    drawPieces(){
        this.pieceGfx.clear();
        const half=(this.cellSize-4)/2;
        for(let c=0;c<COLS;c++)for(let r=0;r<ROWS;r++){
            const p=this.grid[c][r];if(!p)continue;
            const pos=this.cellCenter(c,r);
            this.pieceGfx.fillStyle(COLORS[p.color]);
            this.pieceGfx.fillRoundedRect(pos.x-half,pos.y-half,half*2,half*2,5);
            const is=half*0.3;
            this.pieceGfx.fillStyle(CLIGHT[p.color],0.7);
            if(p.color===0)this.pieceGfx.fillCircle(pos.x,pos.y,is);
            else if(p.color===1){this.pieceGfx.fillTriangle(pos.x,pos.y-is,pos.x+is,pos.y,pos.x,pos.y+is);this.pieceGfx.fillTriangle(pos.x,pos.y-is,pos.x-is,pos.y,pos.x,pos.y+is)}
            else if(p.color===2)this.pieceGfx.fillTriangle(pos.x,pos.y-is,pos.x-is,pos.y+is,pos.x+is,pos.y+is);
            else{const d=is*0.4;this.pieceGfx.fillRect(pos.x-d,pos.y-is,d*2,is*2);this.pieceGfx.fillRect(pos.x-is,pos.y-d,is*2,d*2)}
        }
    }

    update(time,delta){
        const dt=delta/1000,w=this.scale.width;
        if(this.state==='menu'){this.menuTap.setAlpha(0.5+Math.sin(time/400)*0.5);return}
        if(this.state==='dead'){this.dRetry.setAlpha(0.5+Math.sin(time/400)*0.5);return}
        if(this.state!=='playing')return;

        // Rise timer
        if(this.risePause>0){this.risePause-=dt}
        else{
            this.riseTimer+=dt;
            if(this.riseTimer>=this.riseInterval){this.riseTimer=0;this.riseRow()}
        }

        // Rise bar
        this.riseBar.clear();
        const barW=this.cellSize*COLS;
        const barY=this.boardTop+this.cellSize*ROWS+4;
        this.riseBar.fillStyle(0x222233);this.riseBar.fillRect(this.boardLeft,barY,barW,6);
        const prog=this.risePause>0?0:this.riseTimer/this.riseInterval;
        this.riseBar.fillStyle(prog>0.8?0xff4444:0x4488ff);
        this.riseBar.fillRect(this.boardLeft,barY,barW*prog,6);

        this.drawPieces();

        // Particles
        this.partGfx.clear();
        this.particles=this.particles.filter(p=>{
            p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt*4;if(p.life<=0)return false;
            this.partGfx.fillStyle(p.color,p.life);this.partGfx.fillCircle(p.x,p.y,p.size*p.life);return true;
        });
    }
}

new Phaser.Game({
    type:Phaser.AUTO,
    scale:{mode:Phaser.Scale.RESIZE,parent:'game',width:'100%',height:'100%',autoCenter:Phaser.Scale.CENTER_BOTH},
    backgroundColor:'#0a0a14',scene:[GameScene],
    physics:{default:'arcade',arcade:{gravity:{x:0,y:0},debug:false}}
});
</script>
</body>
</html>
